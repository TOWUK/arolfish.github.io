<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            name="description"
            content="Arolfish — стример из СПб и Москвы. Общение и игровые стримы на Twitch."
        />
        <meta name="keywords" content="arolfish, стримы, игровые стримы" />
        <link rel="icon" type="image/webp" href="avatar.webp" />
        <link rel="apple-touch-icon" href="avatar.webp" />
        <title>Arolfish</title>
        <style>
            :root {
                --bg-body: #000;
                --text-title: #fff;
                --text-desc: #aaa;
                --bg-btn: #222;
                --text-btn: #fff;
                --border-btn: #444;
                --radius-btn: 2rem;
                --buttons-per-row: 2;
                --buttons-gap: 1rem;
            }

            * {
                box-sizing: border-box;
            }

            body {
                background: var(--bg-body);
                font-family: system-ui;
                margin: 0;
                height: 100vh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                font-family: system-ui, sans-serif;
                text-align: center;
                padding: 1rem;
                color-scheme: dark;
            }

            h1 {
                color: var(--text-title);
                font-size: clamp(1.8rem, 8vw, 2.8rem);
                font-weight: 900;
                margin: 0 0 0.75rem;
            }

            .desc {
                color: var(--text-desc);
                font-size: 1rem;
                margin-bottom: 2rem;
                line-height: 1.4;
            }

            .buttons {
                display: grid;
                grid-template-columns: repeat(var(--buttons-per-row), 1fr);
                gap: var(--buttons-gap);
                max-width: 400px;
                width: 100%;
            }

            .buttons a {
                background: var(--bg-btn);
                color: var(--text-btn);
                text-decoration: none;
                padding: 0.7rem 0.5rem;
                border-radius: var(--radius-btn);
                border: 1px solid var(--border-btn);
                font-size: clamp(0.85rem, 4vw, 1rem);
                text-align: center;
                white-space: nowrap;
            }
        </style>
    </head>

    <body>
        <h1>Arolfish</h1>
        <div class="desc">Общение и игры на трансляциях</div>
        <div class="buttons">
            <a href="//twitch.tv/arolfish">Twitch</a>
            <a href="//t.me/arolfish1">Telegram</a>
            <a href="//donationalerts.com/r/arolfish">Donate</a>
            <a href="//donatex.gg/donate/arolfish">AI Donate</a>
        </div>
    </body>
</html>
